# Docker Compose definition for the kbx development environment.
# Source is bind-mounted; node_modules lives in a named volume for speed on macOS.
services:
  dev:
    build: .
    image: kbx-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
      - "4173:4173"
    stdin_open: true
    tty: true
    command: bash

volumes:
  node_modules:
